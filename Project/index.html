s<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ticket Queue System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>🎫 Ticket Queue System</h1>

  <div class="input-section">
    <input type="text" id="nameInput" placeholder="Enter customer name">
    <button onclick="addCustomer()">Add</button>
  </div>

  <button class="serve-btn" onclick="serveCustomer()">Serve Next</button>

  <h3>Current Queue</h3>
  <ul id="queueList"></ul>
</div>

<script src="script.js"></script>
</body>
</html>
